syntax = "proto3";

package auth;

option go_package = "pkg/api/auth/v1";

// Сервис аутентификации и авторизации пользователей
service AuthService {
  // Регистрация нового пользователя
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Вход по email и паролю
  rpc Login(LoginRequest) returns (LoginResponse);
  //Получение информации о пользователях
  rpc GetUsersInfo(GetUsersInfoRequest) returns (GetUsersInfoResponse);
  // Получение информации о пользователе по логину
  rpc GetUserInfoByLogin(GetUserInfoByLoginRequest) returns (UserInfo);
  // Создать токен для привязки телеграма
  rpc GenerateTgLink(GenerateTgLinkRequest) returns (GenerateTgLinkResponse);
  // Привязать chat_id из телеграма к юзеру
  rpc BindTelegram(BindTelegramRequest) returns (BindTelegramResponse);
}

// Информация об юзере
message UserInfo {
  string id = 1;
  string name = 2;
  string login = 3;
}

// Запрос на получение информации о пользователе
message GetUsersInfoRequest {
  // Массив ID
  repeated string user_ids = 1;
}

// Ответ на запрос на получение информации о пользователе
message GetUsersInfoResponse {
  // Возвращаем map, где ключ - user_id.
  map<string, UserInfo> users = 1;
}

// Запрос на регистрацию пользователя
message RegisterRequest {
  string email = 1;
  string login = 2;
  string name = 3;
  string password = 4;
}

// Ответ на регистрацию пользователя
message RegisterResponse {
  // JWT-токен
  string access_token = 1;
}

// Авторизация пользователя по почте
message LoginRequest {
  string email = 1;
  string password = 2;
}

// Ответ авторизацию пользователя
message LoginResponse {
  // JWT-токен
  string access_token = 1;
}

message GetUserInfoByLoginRequest {
  string login = 1;
}
// Запрос на создание токена для привязки аккаунта к тг
message GenerateTgLinkRequest {
  string user_id = 1;
}

// Ответ на запрос создания токена для тг - сам токен
message GenerateTgLinkResponse {
  string token = 1;
}

// Запрос на привязку chat_id тг по токену
message BindTelegramRequest {
  string token = 1;
  int64 chat_id = 2;
}

message BindTelegramResponse {
  bool success = 1;
}